<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>万年历 - 农历、节假日、事项管理</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container">
    <header class="header">
      <div class="nav-controls">
        <button id="prevBtn" class="nav-btn" title="上一个">◀</button>
        <div class="current-date">
          <input type="number" id="yearInput" class="year-input" min="1" max="9999"><span id="yearSuffix">年</span><span id="currentMonth"></span><span id="monthSuffix">月</span>
          <span id="lunarYearText" class="lunar-year"></span>
        </div>
        <button id="nextBtn" class="nav-btn" title="下一个">▶</button>
      </div>
      <div class="action-buttons">
        <div class="view-switch">
          <button id="monthViewBtn" class="view-btn active">月</button>
          <button id="yearViewBtn" class="view-btn">年</button>
        </div>
        <button id="todayBtn" class="action-btn">今天</button>
        <button id="themeBtn" class="action-btn" title="切换主题">主题</button>
        <button id="bgBtn" class="action-btn" title="设置背景">背景</button>
        <button id="importBtn" class="action-btn">导入</button>
        <button id="exportBtn" class="action-btn">导出</button>
      </div>
    </header>

    <main id="mainContent">
      <div id="monthView" class="calendar-container">
        <div class="weekday-header">
          <div class="weekday-cell weekend">日</div>
          <div class="weekday-cell">一</div>
          <div class="weekday-cell">二</div>
          <div class="weekday-cell">三</div>
          <div class="weekday-cell">四</div>
          <div class="weekday-cell">五</div>
          <div class="weekday-cell weekend">六</div>
        </div>
        <div id="calendarGrid" class="calendar-grid"></div>
      </div>

      <div id="yearView" class="year-container" style="display: none;"></div>
    </main>

    <footer class="legend">
      <span class="legend-item"><span class="dot holiday-dot"></span>节假日</span>
      <span class="legend-item"><span class="dot workday-dot"></span>调休上班</span>
      <span class="legend-item"><span class="dot weekend-dot"></span>周末</span>
      <span class="legend-item"><span class="dot event-dot"></span>有事项</span>
    </footer>
  </div>

  <div id="eventModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">事项管理</h3>
        <button class="close-btn" id="closeModal">&times;</button>
      </div>
      <div class="modal-body">
        <div class="date-info" id="dateInfo"></div>
        <div class="existing-events">
          <h4>当日事项</h4>
          <div id="eventList" class="event-list"></div>
        </div>
        <div class="add-event-form">
          <h4>添加新事项</h4>
          <div class="form-group">
            <label for="eventTitle">标题 *</label>
            <input type="text" id="eventTitle" placeholder="输入事项标题" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="eventTime">时间</label>
              <input type="time" id="eventTime">
            </div>
            <div class="form-group">
              <label for="eventType">分类</label>
              <select id="eventType">
                <option value="work">工作</option>
                <option value="personal">个人</option>
                <option value="reminder">提醒</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label for="eventNotes">备注</label>
            <textarea id="eventNotes" placeholder="添加备注（可选）" rows="2"></textarea>
          </div>
          <div class="form-actions">
            <button type="button" id="cancelBtn" class="btn btn-secondary">取消</button>
            <button type="button" id="saveBtn" class="btn btn-primary">保存</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="themeModal" class="modal">
    <div class="modal-content modal-small">
      <div class="modal-header">
        <h3>选择主题</h3>
        <button class="close-btn" id="closeThemeModal">&times;</button>
      </div>
      <div class="modal-body">
        <div class="theme-grid" id="themeGrid"></div>
      </div>
    </div>
  </div>

  <div id="bgModal" class="modal">
    <div class="modal-content modal-small">
      <div class="modal-header">
        <h3>设置背景</h3>
        <button class="close-btn" id="closeBgModal">&times;</button>
      </div>
      <div class="modal-body">
        <div class="bg-options">
          <button id="defaultBgBtn" class="bg-option active">默认背景</button>
          <button id="customBgBtn" class="bg-option">上传图片</button>
        </div>
        <div id="bgPreview" class="bg-preview"></div>
        <div class="bg-opacity">
          <label>透明度：<span id="opacityValue">80</span>%</label>
          <input type="range" id="bgOpacity" min="20" max="100" value="80">
        </div>
      </div>
    </div>
  </div>

  <input type="file" id="importInput" accept=".json" style="display: none;">
  <input type="file" id="bgInput" accept="image/*" style="display: none;">

  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/lunar-javascript@1.7.7/lunar.min.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/holiday.js"></script>
  <script src="js/lunar.js"></script>
  <script src="js/events.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/export.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
